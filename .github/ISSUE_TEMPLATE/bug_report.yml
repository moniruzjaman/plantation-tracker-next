name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear description of what the bug is.
      placeholder: "When I click on X, Y happens instead of Z..."
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the issue.
      placeholder: |
        1. Go to the Plantations page
        2. Click 'Create New'
        3. Fill in the form and submit
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain the problem.
  - type: input
    id: environment
    attributes:
      label: Environment
      description: "Browser, OS, Node.js version, etc."
      placeholder: "Chrome 126 / macOS / Node.js 20"
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Frontend UI
        - API / Backend
        - Database
        - Authentication
        - Deployment
        - Other
    validations:
      required: true